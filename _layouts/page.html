---
layout: default
---

<article class="page-shell">
  <header class="page-hero compact">
    <p class="eyebrow">{{ page.eyebrow | default: "Notebook" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-content post-content">
    {% assign normalized_content = content | replace: '<h1', '<h2 class="content-heading"' | replace: '</h1>', '</h2>' %}
    {{ normalized_content }}
  </div>
</article>
